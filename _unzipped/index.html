<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Micron — Hash Rosin Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #07080a; color: #fff; height: 100%; }
  body {
    font-family: 'Inter Tight', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  #stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    box-sizing: border-box;
    background:
      radial-gradient(circle at 20% 10%, rgba(220,180,90,0.05), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(100,140,160,0.04), transparent 50%),
      #07080a;
  }
  #caption {
    position: fixed; bottom: 14px; left: 0; right: 0; text-align: center;
    font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10px;
    color: rgba(255,255,255,0.28); letter-spacing: 2px; pointer-events: none;
  }
</style>
<script type="application/json" id="tweaks-defaults">
/*EDITMODE-BEGIN*/{
  "theme": "dark",
  "weightUnit": "g",
  "tempUnit": "F"
}/*EDITMODE-END*/
</script>
</head>
<body>
<div id="stage">
  <div id="root"></div>
</div>
<div id="caption">MICRON · ICE WATER HASH TRACKER · PWA PROTOTYPE</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="micron/ios-frame.jsx"></script>
<script type="text/babel" src="micron/tokens.jsx"></script>
<script type="text/babel" src="micron/data.jsx"></script>
<script type="text/babel" src="micron/primitives.jsx"></script>
<script type="text/babel" src="micron/photo-notes.jsx"></script>
<script type="text/babel" src="micron/grade-units.jsx"></script>
<script type="text/babel" src="micron/screen-home.jsx"></script>
<script type="text/babel" src="micron/screen-setup-wash.jsx"></script>
<script type="text/babel" src="micron/screen-freezedry.jsx"></script>
<script type="text/babel" src="micron/screen-press.jsx"></script>
<script type="text/babel" src="micron/screen-cure.jsx"></script>
<script type="text/babel" src="micron/screen-summary.jsx"></script>
<script type="text/babel" src="micron/app.jsx"></script>

<script type="text/babel" data-presets="react">
  function Shell() {
    const [theme, setTheme] = React.useState(
      localStorage.getItem('micron-theme') || 'hashlab'
    );
    React.useEffect(() => {
      const i = setInterval(() => {
        const t = localStorage.getItem('micron-theme') || 'hashlab';
        if (t !== theme) setTheme(t);
      }, 200);
      return () => clearInterval(i);
    }, [theme]);
    const dark = !(theme === 'light' || theme === 'hashlab-light');
    const squareClass = (theme === 'hashlab' || theme === 'hashlab-light') ? 'hl-square' : '';
    return (
      <div data-screen-label="Micron prototype" style={{ position: 'relative' }}>
        <IOSDevice dark={dark} width={402} height={874}>
          <div className={squareClass} style={{ position: 'relative', height: '100%', background: window.MicronTokens[theme].bg }}
               data-screen-label="App">
            <MicronApp/>
          </div>
        </IOSDevice>
      </div>
    );
  }
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<Shell/>);
</script>

</body>
</html>
