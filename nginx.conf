# Hashashin nginx config — SPA routing + PWA-correct caching.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

  # Service worker + registration + manifest must NEVER be cached long —
  # they are how updates reach installed apps.
  location ~* ^/(sw\.js|registerSW\.js|manifest\.webmanifest)$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Hashed build assets are immutable
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Icons/textures: cache for a day
  location ~* \.(png|jpg|jpeg|svg|webp|ico)$ {
    add_header Cache-Control "public, max-age=86400";
  }

  # SPA fallback — index.html itself stays fresh
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }

  # Baseline security headers
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
